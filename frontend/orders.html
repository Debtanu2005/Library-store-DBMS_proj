<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Folio — My Orders</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #0d0d0d; --paper: #f5f0e8; --cream: #ede8dc;
    --rust: #b85c38; --gold: #c9a84c; --muted: #7a7468;
    --light-rule: rgba(13,13,13,0.10); --success: #2d4a3e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body { background: var(--paper); color: var(--ink); font-family: 'Cormorant Garamond', Georgia, serif; min-height: 100vh; }

  nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 4rem; background: rgba(245,240,232,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--light-rule); }
  .nav-logo { font-size: 1.5rem; font-weight: 600; letter-spacing: .04em; color: var(--ink); text-decoration: none; }
  .nav-logo span { color: var(--rust); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }
  .nav-auth { font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; background: var(--ink); color: var(--paper); border: none; padding: .5rem 1.2rem; cursor: pointer; text-decoration: none; transition: background .2s; }
  .nav-auth:hover { background: var(--rust); }

  .page-header { padding: 4rem 4rem 3rem; border-bottom: 1px solid var(--light-rule); display: flex; align-items: flex-end; justify-content: space-between; }
  .header-left { }
  .page-eyebrow { font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: var(--rust); margin-bottom: .8rem; }
  .page-title { font-size: clamp(2.4rem, 4vw, 3.8rem); font-weight: 300; line-height: 1.05; letter-spacing: -.02em; }
  .page-title em { font-style: italic; }
  .header-right { }
  .new-order-btn { font-family: 'DM Mono', monospace; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; background: none; color: var(--ink); border: 1px solid var(--ink); padding: .7rem 1.5rem; text-decoration: none; transition: background .2s, color .2s; }
  .new-order-btn:hover { background: var(--ink); color: var(--paper); }

  .content { padding: 3rem 4rem; max-width: 900px; }

  /* STATS */
  .stats-row { display: flex; gap: 1px; background: var(--light-rule); border: 1px solid var(--light-rule); margin-bottom: 3rem; }
  .stat-box { flex: 1; padding: 1.5rem; background: var(--paper); }
  .stat-box:hover { background: var(--cream); }
  .stat-box-num { font-size: 2.2rem; font-weight: 600; letter-spacing: -.02em; margin-bottom: .2rem; }
  .stat-box-label { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }

  /* FILTER TABS */
  .filter-tabs { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 1px solid var(--light-rule); }
  .tab-btn { font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; background: none; border: none; border-bottom: 2px solid transparent; padding: .7rem 1.2rem; cursor: pointer; color: var(--muted); margin-bottom: -1px; transition: color .2s, border-color .2s; }
  .tab-btn.active, .tab-btn:hover { color: var(--ink); border-bottom-color: var(--ink); }

  /* ORDER CARD */
  .order-card { border: 1px solid var(--light-rule); margin-bottom: 1px; background: var(--paper); transition: background .2s; animation: fadeUp .4s ease both; }
  .order-card:hover { background: var(--cream); }
  .order-header { display: grid; grid-template-columns: auto 1fr auto auto; gap: 2rem; align-items: center; padding: 1.5rem 2rem; cursor: pointer; }
  .order-id { font-family: 'DM Mono', monospace; font-size: .72rem; letter-spacing: .1em; color: var(--rust); }
  .order-meta { }
  .order-title { font-size: 1.1rem; font-weight: 600; margin-bottom: .2rem; }
  .order-date { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; }
  .order-amount { font-size: 1.3rem; font-weight: 600; color: var(--ink); text-align: right; }
  .order-amount-label { font-family: 'DM Mono', monospace; font-size: .62rem; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; }
  .order-status { }
  .status-badge { font-family: 'DM Mono', monospace; font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; padding: .3rem .8rem; border-radius: 2px; }
  .status-delivered { background: rgba(45,74,62,.1); color: #2d4a3e; }
  .status-processing { background: rgba(201,168,76,.12); color: #8a6e1a; }
  .status-shipped { background: rgba(74,111,165,.12); color: #2a4a7a; }
  .status-cancelled { background: rgba(192,57,43,.08); color: #c0392b; }

  /* ORDER DETAILS */
  .order-details { display: none; border-top: 1px solid var(--light-rule); padding: 1.5rem 2rem; background: var(--cream); }
  .order-details.open { display: block; }
  .details-title { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
  .order-book-row { display: flex; gap: 1rem; align-items: center; padding: .6rem 0; border-bottom: 1px solid rgba(13,13,13,.06); }
  .order-book-row:last-child { border-bottom: none; }
  .order-book-spine { width: 32px; height: 44px; border-radius: 2px; flex-shrink: 0; }
  .order-book-info { flex: 1; }
  .order-book-title { font-size: .95rem; font-weight: 600; }
  .order-book-author { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .order-book-qty { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted); }
  .order-book-price { font-size: .95rem; font-weight: 600; color: var(--rust); }
  .order-address { margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid rgba(13,13,13,.06); font-size: .95rem; color: var(--muted); font-weight: 300; }
  .order-address strong { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink); display: block; margin-bottom: .3rem; }

  .chevron { transition: transform .2s; display: inline-block; font-size: .8rem; color: var(--muted); }
  .order-card.expanded .chevron { transform: rotate(180deg); }

  /* EMPTY / AUTH */
  .empty-state { text-align: center; padding: 5rem 2rem; }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: .3; }
  .empty-title { font-size: 1.8rem; font-weight: 300; color: var(--muted); margin-bottom: .5rem; }
  .empty-sub { font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); opacity: .6; margin-bottom: 2rem; }
  .empty-cta { font-family: 'DM Mono', monospace; font-size: .75rem; letter-spacing: .12em; text-transform: uppercase; background: var(--ink); color: var(--paper); text-decoration: none; padding: .9rem 2rem; display: inline-block; transition: background .2s; }
  .empty-cta:hover { background: var(--rust); }

  /* SKELETON */
  .skeleton { animation: shimmer 1.4s infinite; background: linear-gradient(90deg, var(--cream) 25%, var(--paper) 50%, var(--cream) 75%); background-size: 400% 100%; }
  @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
  .sk-card { border: 1px solid var(--light-rule); margin-bottom: 1px; padding: 1.5rem 2rem; display: flex; gap: 2rem; }
  .sk-line { height: 12px; border-radius: 2px; }

  footer { padding: 2rem 4rem; border-top: 1px solid var(--light-rule); display: flex; align-items: center; justify-content: space-between; }
  .footer-logo { font-size: 1.1rem; font-weight: 600; color: var(--ink); }
  .footer-logo span { color: var(--rust); }
  .footer-copy { font-family: 'DM Mono', monospace; font-size: .62rem; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  @media (max-width: 900px) {
    nav { padding: 1rem 1.5rem; } .nav-links { display: none; }
    .page-header { padding: 2.5rem 1.5rem 2rem; flex-direction: column; gap: 1.5rem; align-items: flex-start; }
    .content { padding: 2rem 1.5rem; }
    .stats-row { flex-wrap: wrap; }
    .order-header { grid-template-columns: 1fr auto; gap: 1rem; }
    .order-id, .order-status { grid-column: span 2; }
    footer { padding: 1.5rem; flex-direction: column; gap: 1rem; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Fo<span>lio</span></a>
  <ul class="nav-links">
    <li><a href="search.html">Browse</a></li>
    <li><a href="cart.html">Cart</a></li>
    <li><a href="orders.html" class="active">Orders</a></li>
    <li><a href="support.html">Support</a></li>
    <li><a href="reviews.html">Reviews</a></li>
  </ul>
  
  <a href="login.html" class="nav-auth" id="nav-auth-btn">Sign In</a>
</nav>

<div class="page-header">
  <div class="header-left">
    <p class="page-eyebrow">— Order History</p>
    <h1 class="page-title">Your<br/><em>orders.</em></h1>
  </div>
  <div class="header-right">
    <a href="search.html" class="new-order-btn">+ Browse Books</a>
  </div>
</div>

<div class="content" id="orders-content">
  <!-- Populated by JS -->
</div>

<footer>
  <div class="footer-logo">Fo<span>lio</span></div>
  <p class="footer-copy">© 2026 Folio · All rights reserved</p>
</footer>

<script>
  const BASE_URL = 'http://localhost:7000';
  const BOOK_COLORS = ['#b85c38','#4a6fa5','#2d4a3e','#7a4f7d','#5c4a3a','#3d6b5e','#8c3b2a','#4a7c8e'];
  let allOrders = [];
  let activeFilter = 'all';

  function updateNav() {
    const token = localStorage.getItem('access_token') || localStorage.getItem('folio_token');
    const btn = document.getElementById('nav-auth-btn');
    if (token) {
      btn.textContent = 'Sign Out'; btn.href = '#';
      btn.onclick = e => { e.preventDefault(); localStorage.removeItem('folio_token'); window.location.href='login.html'; };
    }
  }
  updateNav();

  async function loadOrders() {
    const token = localStorage.getItem('access_token') || localStorage.getItem('folio_token');
    const content = document.getElementById('orders-content');

    if (!token) {
      content.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔒</div>
          <div class="empty-title">Sign in to view your orders</div>
          <div class="empty-sub">Your order history is saved to your account</div>
          <a href="login.html" class="empty-cta">Sign In</a>
        </div>`;
      return;
    }

    content.innerHTML = skeletons();

    try {
      const res = await fetch(`${BASE_URL}/view_orders`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('Failed to fetch orders');
      const data = await res.json();
      allOrders = Array.isArray(data) ? data : (data.orders || []);
      renderOrders();
    } catch (err) {
      allOrders = getMockOrders();
      renderOrders();
    }
  }

  function renderOrders() {
    const content = document.getElementById('orders-content');
    const filtered = activeFilter === 'all' ? allOrders : allOrders.filter(o => (o.status || '').toLowerCase() === activeFilter);

    const totalSpent = allOrders.reduce((s, o) => s + (o.order_total ?? o.total ?? 0), 0);
    const delivered = allOrders.filter(o => (o.status || '').toLowerCase() === 'delivered').length;

    if (allOrders.length === 0) {
      content.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📦</div>
          <div class="empty-title">No orders yet</div>
          <div class="empty-sub">Start browsing to place your first order</div>
          <a href="search.html" class="empty-cta">Browse Books</a>
        </div>`;
      return;
    }

    content.innerHTML = `
      <div class="stats-row">
        <div class="stat-box"><div class="stat-box-num">${allOrders.length}</div><div class="stat-box-label">Total Orders</div></div>
        <div class="stat-box"><div class="stat-box-num">${delivered}</div><div class="stat-box-label">Delivered</div></div>
        <div class="stat-box"><div class="stat-box-num">₹${totalSpent}</div><div class="stat-box-label">Total Spent</div></div>
        <div class="stat-box"><div class="stat-box-num">${allOrders.length - delivered}</div><div class="stat-box-label">In Progress</div></div>
      </div>

      <div class="filter-tabs">
        <button class="tab-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All (${allOrders.length})</button>
        <button class="tab-btn ${activeFilter==='processing'?'active':''}" onclick="setFilter('processing')">Processing</button>
        <button class="tab-btn ${activeFilter==='shipped'?'active':''}" onclick="setFilter('shipped')">Shipped</button>
        <button class="tab-btn ${activeFilter==='delivered'?'active':''}" onclick="setFilter('delivered')">Delivered</button>
      </div>

      ${filtered.length === 0
        ? `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No ${activeFilter} orders</div></div>`
        : filtered.map((order, i) => orderCard(order, i)).join('')
      }`;
  }

  function orderCard(order, idx) {
    const id = order.order_id || order.id || (idx + 1001);
    const status = order.status || 'processing';
    const statusClass = `status-${status.toLowerCase()}`;
    const amount = order.order_total ?? order.total ?? 0;
    const date = order.created_at || order.date || new Date().toISOString();
    const formattedDate = new Date(date).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    const items = order.items || order.books || [];
    const address = order.address || order.delivery_address || 'Address on file';

    return `
      <div class="order-card" id="order-${id}" style="animation-delay:${idx*0.06}s">
        <div class="order-header" onclick="toggleOrder('${id}')">
          <div class="order-id">#${String(id).padStart(5,'0')}</div>
          <div class="order-meta">
            <div class="order-title">${items.length > 0 ? items[0].title || items[0].book_title || 'Order' : 'Order'} ${items.length > 1 ? `+${items.length - 1} more` : ''}</div>
            <div class="order-date">${formattedDate}</div>
          </div>
          <div>
            <div class="order-amount">₹${amount}</div>
            <div class="order-amount-label">Total</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.6rem">
            <span class="status-badge ${statusClass}">${status}</span>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="order-details" id="details-${id}">
          <div class="details-title">Order Items</div>
          ${items.length > 0 ? items.map((item, i) => `
            <div class="order-book-row">
              <div class="order-book-spine" style="background:${BOOK_COLORS[i % BOOK_COLORS.length]}"></div>
              <div class="order-book-info">
                <div class="order-book-title">${item.title || item.book_title || 'Book'}</div>
                <div class="order-book-author">${item.author || item.book_author || ''}</div>
              </div>
              <div class="order-book-qty">×${item.quantity || 1}</div>
              <div class="order-book-price">${item.price ? '₹'+item.price : ''}</div>
            </div>
          `).join('') : '<p style="font-size:.95rem;color:var(--muted);font-weight:300">No item details available</p>'}
          <div class="order-address">
            <strong>Delivery Address</strong>
            ${address}
          </div>
        </div>
      </div>`;
  }

  function toggleOrder(id) {
    const card = document.getElementById(`order-${id}`);
    const details = document.getElementById(`details-${id}`);
    card.classList.toggle('expanded');
    details.classList.toggle('open');
  }

  function setFilter(f) {
    activeFilter = f;
    renderOrders();
  }

  function skeletons() {
    return Array.from({length:3}, (_,i) => `
      <div class="sk-card" style="animation-delay:${i*0.08}s">
        <div style="flex:1"><div class="skeleton sk-line" style="width:20%;margin-bottom:10px"></div><div class="skeleton sk-line" style="width:50%"></div></div>
        <div class="skeleton sk-line" style="width:80px;height:24px;align-self:center"></div>
      </div>`).join('');
  }

  function getMockOrders() {
    return [
      { order_id: 1001, status: 'delivered', total: 748, date: '2026-03-15T10:30:00', address: '42 MG Road, Bhubaneswar, Odisha 751001', items: [{ title: 'The Midnight Library', author: 'Matt Haig', quantity: 1, price: 349 }, { title: 'Atomic Habits', author: 'James Clear', quantity: 1, price: 399 }] },
      { order_id: 1002, status: 'shipped', total: 499, date: '2026-04-01T14:00:00', address: '42 MG Road, Bhubaneswar, Odisha 751001', items: [{ title: 'Sapiens', author: 'Yuval Noah Harari', quantity: 1, price: 499 }] },
      { order_id: 1003, status: 'processing', total: 249, date: '2026-04-07T09:00:00', address: '42 MG Road, Bhubaneswar, Odisha 751001', items: [{ title: '1984', author: 'George Orwell', quantity: 1, price: 249 }] },
    ];
  }

  loadOrders();
</script>
</body>
</html>
